  schedule:
    - cron: "19 6 * * MON-FRI" # Every weekday
jobs:
  security-npm-dependency-check:
    name: Project security npm dependency check
    uses: ministryofjustice/hmpps-github-actions/.github/workflows/security_npm_dependency.yml@e3a6dc63e5eeadbc1fa221c4057fcec949bc47b8 # v2.14.13
    with:
      channel_id: ${{ vars.SECURITY_ALERTS_SLACK_CHANNEL_ID || 'NO_SLACK' }}
    secrets: inherit

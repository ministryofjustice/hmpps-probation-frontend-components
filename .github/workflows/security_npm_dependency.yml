    uses: ministryofjustice/hmpps-github-actions/.github/workflows/security_npm_dependency.yml@e7db1568006ed68b8238ec1ded2a6c175d6b78a6 # v2.14.2
    with:
      channel_id: ${{ vars.SECURITY_ALERTS_SLACK_CHANNEL_ID || 'NO_SLACK' }}
    secrets: inherit
